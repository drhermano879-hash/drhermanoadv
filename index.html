<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Primary & Verification -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Hermano Sousa Advogados Associados" />
    <link rel="canonical" href="https://hermanosousa.adv.br/" />

    <!-- Google Fonts Preconnect & DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Content Security Policy (defense-in-depth) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://maps.google.com https://maps.gstatic.com;
      connect-src 'self' https://api.resend.com https://maps.google.com;
      frame-src 'self' https://maps.google.com https://www.google.com;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    ">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
